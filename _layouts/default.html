<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% seo %}
    <style>
      .copy-wrap          { position: relative; }
      .copy-btn           {
        position: absolute; top: 8px; right: 8px;
        padding: 5px 12px;
        background: #0078d4; color: #fff;
        border: none; border-radius: 6px;
        font-size: 12px; font-weight: 600; cursor: pointer;
        opacity: 0;
        transition: opacity .15s ease;
      }
      .copy-wrap:hover .copy-btn { opacity: 1; }
      .copy-btn.copied           { background: #107c10; opacity: 1; }
    </style>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S0WCFXQK0T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-S0WCFXQK0T');
    </script>

    <script>
  const REPO = "EverythingIsChr0me/copilot-cowork-prompts";
  const API  = `https://api.github.com/repos/${REPO}/commits?per_page=10`;

  fetch(API, { headers: { Accept: "application/vnd.github+json" } })
    .then(r => r.json())
    .then(commits => {
      const list = document.getElementById("recent-commits-list");
      list.innerHTML = commits.map(c => {
        const date    = new Date(c.commit.author.date).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
        const message = c.commit.message.split("\n")[0]; // first line only
        const url     = c.html_url;
        return `<li><span class="commit-date">${date}</span> — <a href="${url}" target="_blank">${message}</a></li>`;
      }).join("");
    })
    .catch(() => {
      document.getElementById("recent-commits-list").innerHTML = "<li>Could not load recent changes.</li>";
    });
</script>

  </head>
  <body>

<header class="page-header" role="banner">
  <div style="display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px;">
    <img src="{{ '/assets/images/Cowork.png' | relative_url }}" alt="Cowork logo" style="height: 64px;">
    <h1 class="project-name" style="margin: 0;">{{ site.title }}</h1>
  </div>
  <h2 class="project-tagline">{{ site.description }}</h2>
  <a href="{{ site.github.repository_url }}" class="btn">View on GitHub</a>
  <a href="{{ '/' | relative_url }}" class="btn btn-outline">Browse Prompts</a>
</header>

    {% include nav.html %}

    <main id="main-content" class="main-content" role="main">     
      {{ content }}
    </main>

    <footer class="site-footer" role="contentinfo">
      <span class="site-footer-owner">
        <a href="{{ site.github.repository_url }}">{{ site.title }}</a> is maintained by the community.
      </span>
      <span class="site-footer-credits">
        <a href="{{ '/CONTRIBUTING.md' | relative_url }}">Contribute a prompt</a> ·
        <a href="{{ site.github.repository_url }}/blob/main/LICENSE">MIT License</a>
      </span>
    </footer>

    {% include copy-prompt.html %}


    <!-- Recent Changes via GitHub API -->
<section id="recent-changes">
  <h2>Recent Changes</h2>
  <ul id="recent-commits-list">
    <li>Loading...</li>
  </ul>
</section>

  </body>
</html>
