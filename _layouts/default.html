<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% seo %}
    <style>
      .copy-wrap          { position: relative; }
      .copy-btn           {
        position: absolute; top: 8px; right: 8px;
        padding: 5px 12px;
        background: #0078d4; color: #fff;
        border: none; border-radius: 6px;
        font-size: 12px; font-weight: 600; cursor: pointer;
        opacity: 0;
        transition: opacity .15s ease;
      }
      .copy-wrap:hover .copy-btn { opacity: 1; }
      .copy-btn.copied           { background: #107c10; opacity: 1; }

      .repo-meta {
        background: #f6f8fa;
        border-bottom: 1px solid #e1e4e8;
        text-align: center;
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
        color: #57606a;
      }
      .repo-meta a {
        color: #0078d4;
        text-decoration: none;
      }
      .repo-meta a:hover {
        text-decoration: underline;
      }
    </style>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S0WCFXQK0T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-S0WCFXQK0T');
    </script>
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon/favicon-32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon/favicon-16.png' | relative_url }}">
    <link rel="shortcut icon" href="{{ '/assets/favicon/favicon.ico' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon/apple-touch-icon.png' | relative_url }}">    
  </head>
  <body>

<header class="page-header" role="banner">
  <div style="display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px;">
    <img src="{{ '/assets/images/Cowork.png' | relative_url }}" alt="Cowork logo" style="height: 64px;">
    <h1 class="project-name" style="margin: 0;">{{ site.title }}</h1>
  </div>
  <h2 class="project-tagline">{{ site.description }}</h2>
  <a href="{{ site.github.repository_url }}" class="btn">View on GitHub</a>
  <a href="{{ '/' | relative_url }}" class="btn btn-outline">Browse Prompts</a>
</header>

    {% include nav.html %}
    {% include github-api.html %}
    <div class="repo-meta">
      <span id="repo-last-updated">Checking for updates…</span>
    </div>
    <main id="main-content" class="main-content" role="main">
      {{ content }}
    </main>

    <footer class="site-footer" role="contentinfo">
      <span class="site-footer-owner">
        <a href="{{ site.github.repository_url }}">{{ site.title }}</a> is maintained by the community.
      </span>
      <span class="site-footer-credits">
        <a href="{{ '/CONTRIBUTING.md' | relative_url }}">Contribute a prompt</a> ·
        <a href="{{ site.github.repository_url }}/blob/main/LICENSE">MIT License</a>
      </span>
    </footer>

    {% include copy-prompt.html %}

    <script>
      (() => {
        const key    = "repo_last_updated";
        const cached = GitHubAPI.cached(key);
        if (cached) { document.getElementById("repo-last-updated").innerHTML = cached; return; }

        GitHubAPI.fetch$("assets/data/last_updated.json")
          .then(data => {
            const dt = new Date(data.date).toLocaleString("en-US", {
              year: "numeric", month: "short", day: "numeric",
              hour: "numeric", minute: "2-digit"
            });
            const html = `Last updated: ${dt} &nbsp;·&nbsp; <a href="${GitHubAPI.BASE_URL}/changelog">View changelog</a>`;
            GitHubAPI.cache("repo_last_updated", html);
            document.getElementById("repo-last-updated").innerHTML = html;
          })
          .catch(() => document.getElementById("repo-last-updated").textContent = "");
      })();
    </script>
  </body>
</html>
